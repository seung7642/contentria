spring:
  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        hbm2ddl:
          create_namespaces: true


  batch:
    jdbc:
      initialize-schema: always

app:
  batch:
    job-name: dailyStatisticsJob

logging:
  level:
    org.springframework.batch: DEBUG