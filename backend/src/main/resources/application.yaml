server:
  port: 8080
  servlet:
    context-path: /api


spring:
  application:
    name: backend

  config:
    import: optional:file:.env[.properties]

  datasource:
    url: jdbc:h2:mem:authdb
    driver-class-name: org.h2.Driver
    username: sa
    password:

  jpa:
    hibernate:
      ddl-auto: update # 운영 환경에서는 validate 설정 필요. (Flyway 또는 Liquibase 같은 데이터베이스 마이그레이션 도구도 고려)
    show-sql: false
    properties:
      hibernate:
        format_sql: true

  security:
    oauth2:
      client:
        registration:
          google:
            client-id: ${GOOGLE_CLIENT_ID}
            client-secret: ${GOOGLE_CLIENT_SECRET}
            scope:
              - openid
              - email
              - profile
            redirect-uri: "{baseUrl}/login/oauth2/code/{registrationId}"

app:
  auth:
    jwt:
      secret: ${JWT_SECRET}
      access-token-expiration-ms: 900000       # access token 만료 시간: 15분
      refresh-token-expiration-ms: 604800000   # refresh token 만료 시간: 7일
    cookie:
      access-token-name: "access_token"
      refresh-token-name: "refresh_token"
      access-token-path: "/"
      refresh-token-path: "/api/auth"
    oidc:
      success-redirect-url: http://localhost:3000/dashboard
    verification-code:
      ttl-minutes: 10
      length: 6
      redis-key-prefix: "verification_code:email:"
  cors:
    allowed-origins: http://localhost:3000

logging:
  level:
    root: info