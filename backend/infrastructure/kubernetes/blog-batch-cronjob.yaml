apiVersion: batch/v1
kind: CronJob
metadata:
  name: blog-daily-statistics
  namespace: default
  labels:
    app: blog-batch
    job-type: daily-statistics
spec:
  # 매일 KST 01:00 — 어제(KST)의 PV/UV 집계
  schedule: "0 1 * * *"
  timeZone: "Asia/Seoul"

  # 동시성 제어: 이전 실행이 안 끝났으면 새 실행을 막음
  concurrencyPolicy: Forbid

  # 히스토리 보관: 최근 성공 7개, 실패 3개 Job 객체 유지
  successfulJobsHistoryLimit: 7
  failedJobsHistoryLimit: 3

  # 노드 다운 등으로 스케줄을 놓쳤을 때, 10분 안이면 따라잡아 실행
  startingDeadlineSeconds: 600

  jobTemplate:
    spec:
      # Pod 단위 실패 시 최대 2번까지 재시도 (멱등성 확보된 상태이므로 안전)
      backoffLimit: 2

      # 1시간 안에 못 끝나면 강제 종료 — 평상시 실행시간의 2~3배 권장
      activeDeadlineSeconds: 3600

      # 완료된 Job/Pod를 1시간 뒤 자동 정리 (로그는 K8s 로그 수집기로 미리 빠져나가 있어야 함)
      ttlSecondsAfterFinished: 3600

      template:
        metadata:
          labels:
            app: blog-batch
            job-type: daily-statistics
        spec:
          restartPolicy: Never        # 실패 원인 보존을 위해 Never + backoffLimit 조합 권장

          containers:
            - name: blog-batch
              image: contentria/blog-batch:1.0.0
              imagePullPolicy: IfNotPresent

              # Spring Boot CLI 인자: 실행할 Job 이름만 지정
              # targetDate는 Step 코드에서 어제(KST)로 디폴트되므로 평상시엔 생략
              args:
                - "--spring.batch.job.name=dailyStatisticsJob"

              env:
                - name: TZ
                  value: "Asia/Seoul"
                - name: SPRING_PROFILES_ACTIVE
                  value: "prod"
                - name: DATABASE_URL
                  valueFrom:
                    secretKeyRef:
                      name: blog-batch-secret
                      key: db-url
                - name: DATABASE_USERNAME
                  valueFrom:
                    secretKeyRef:
                      name: blog-batch-secret
                      key: db-username
                - name: DATABASE_PASSWORD
                  valueFrom:
                    secretKeyRef:
                      name: blog-batch-secret
                      key: db-password

              resources:
                requests:
                  memory: "512Mi"
                  cpu: "200m"
                limits:
                  memory: "1Gi"
                  cpu: "1000m"

              # 보안 권장: 가능한 권한 최소화
              securityContext:
                allowPrivilegeEscalation: false
                readOnlyRootFilesystem: true
                runAsNonRoot: true
                capabilities:
                  drop: ["ALL"]
                seccompProfile:
                  type: RuntimeDefault

              # readOnlyRootFilesystem 사용 시 임시 쓰기 영역이 필요할 수 있음
              # JVM, Spring Boot가 /tmp에 쓰는 케이스 대비
              volumeMounts:
                - name: tmp
                  mountPath: /tmp

          volumes:
            - name: tmp
              emptyDir: {}