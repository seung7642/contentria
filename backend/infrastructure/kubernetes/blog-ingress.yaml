apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: blog-ingress
  annotations:
    cert-manager.io/cluster-issuer: "letsencrypt-prod"
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
    nginx.ingress.kubernetes.io/backend-protocol: "HTTP"
spec:
  ingressClassName: nginx
  tls:
    - hosts:
        - www.contentria.com
        - contentria.com
      secretName: contentria-tls-secret
  rules:
    - host: blog.contentria.com
      http:
        paths:
          # -----------------------------------------------------------
          # 1. 백엔드 라우팅 (/api 경로)
          # -----------------------------------------------------------
          # 구글 로그인 콜백 등 외부에서 백엔드를 직접 호출해야 할 때 사용됩니다.
          - path: /api
            pathType: Prefix
            backend:
              service:
                name: blog-api-service
                port:
                  number: 8080

          # -----------------------------------------------------------
          # 2. 프론트엔드 라우팅 (그 외 모든 경로)
          # -----------------------------------------------------------
          - path: /
            pathType: Prefix
            backend:
              service:
                name: blog-frontend-service
                port:
                  number: 80