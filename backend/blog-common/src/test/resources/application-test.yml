spring:
  mail:
    host: ${MAILGUN_HOST:smtp.mailgun.org}
    port: ${MAILGUN_PORT:587}
    username: ${MAILGUN_USERNAME}
    password: ${MAILGUN_PASSWORD}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true
            required: true
          connectiontimeout: 5000 # Connection timeout
          timeout: 5000 # Read timeout
          writetimeout: 5000 # Write timeout
  thymeleaf:
    prefix: classpath:/templates/
    suffix: .html
    encoding: UTF-8
    cache: false

common:
  mail:
    mailgun:
      from-address: "Contentria <no-reply@contentria.com>"

test:
  email:
    recipient: ${TEST_EMAIL_RECIPIENT}