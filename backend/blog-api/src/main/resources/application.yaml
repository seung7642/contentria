server:
  port: 8080
  servlet:
    context-path: /api
  forward-headers-strategy: native

logging:
  level:
    root: INFO
    org.springframework.security.web: INFO
    org.hibernate.sql: DEBUG
    com.giffing.bucket4j: INFO
    com.contentria.api.config.security.JwtAuthenticationFilter: DEBUG

spring:
  application:
    name: backend
  datasource:
    url: ${DATABASE_URL}
    driver-class-name: org.postgresql.Driver
    username: ${DATABASE_USERNAME}
    password: ${DATABASE_PASSWORD}
  jpa:
    show-sql: false
    hibernate:
      ddl-auto: validate # Validates the schema matches the entities. No changes are made
    # -------------------------------------
    # Disables OSIV to release the database connection early after the transaction ends.
    # Note: Lazy loading will fail outside the transaction scope.
    # -------------------------------------
    open-in-view: false
    # -------------------------------------
    # Hibernate native properties
    #   - https://docs.spring.io/spring-boot/reference/data/sql.html#data.sql.jpa-and-spring-data.creating-and-dropping
    # -------------------------------------
    properties.hibernate:
      format_sql: true
      jdbc:
        batch_size: 100
      default_batch_fetch_size: 100
      order_inserts: true
      order_updates: true
  security:
    oauth2.client.registration.google:
      client-id: ${SPRING_OAUTH_GOOGLE_CLIENT_ID}
      client-secret: ${SPRING_OAUTH_GOOGLE_CLIENT_SECRET}
      # The presence of the `openid` scope indicates that OpenID Connect 1.0 should be used.
      # This instructs Spring Security to use OIDC-specific components (such as `OidcUserService`) during request processing.
      # Without this scope, Spring Security will use OAuth2-specific components (such as `DefaultOAuth2UserService`) instead.
      scope: openid,profile,email
      redirect-uri: "{baseUrl}/login/oauth2/code/{registrationId}"
  cache:
    jcache:
      provider: com.github.benmanes.caffeine.jcache.spi.CaffeineCachingProvider # Cache Provider가 하나일 경우 생략 가능하지만, 명시성을 위해 기입
    cache-names:
      - rateLimiting
      - verificationCode
    caffeine:
      spec: maximumSize=1000,expireAfterAccess=300s
  mail:
    host: ${MAILGUN_HOST:smtp.mailgun.org}
    port: ${MAILGUN_PORT:587}
    username: ${MAILGUN_USERNAME}
    password: ${MAILGUN_PASSWORD}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true
            required: true
          connectiontimeout: 5000 # Connection timeout
          timeout: 5000 # Read timeout
          writetimeout: 5000 # Write timeout
  thymeleaf:
    prefix: classpath:/templates/
    suffix: .html
    encoding: UTF-8
    cache: false # Disable template caching for development. Enable in production for better performance.

bucket4j:
  enabled: true
  filters:
    - id: rateLimitingFilter
      cache-name: rateLimiting
      url: "/api/auth/.*"
      rate-limits:
        - cache-key: "@ipResolver.getClientIp(#root)"
          post-execute-condition: getStatus() eq 200
          numTokens: 1 # The number of tokens that should be consumed
          bandwidths:
            - capacity: 10
              initial-capacity: 10
              time: 1
              unit: minutes
              refill-speed: interval

app:
  auth:
    jwt:
      secret: ${JWT_SECRET}
      access-token-expiration: 15m   # 15 minutes
      refresh-token-expiration: 7d   # 7 days
    cookie:
      access-token-name: "accessToken"
      refresh-token-name: "refreshToken"
      access-token-path: "/"
      refresh-token-path: "/"
      secure: ${COOKIE_SECURE:false}
    oidc:
      success-redirect-url: http://localhost:3000/login/callback
    verification-code:
      ttl-minutes: 10
      length: 6
      redis-key-prefix: "verification_code:email:"
    recaptcha:
      v2-secret-key: ${GOOGLE_RECAPTCHA_V2_SECRET_KEY}
      v3-secret-key: ${GOOGLE_RECAPTCHA_V3_SECRET_KEY}
      score-threshold: 1.0 # Pass only if score is equal to this value or higher
      site-verify-url: "https://www.google.com/recaptcha/api/siteverify"
      expected-hostname: "localhost"
      expected-actions:
        signup_initiate: "signup_initiate"
        login: "login"
  r2:
    access-key-id: ${R2_ACCESS_KEY_ID}
    secret-access-key: ${R2_SECRET_ACCESS_KEY}
    endpoint: ${R2_ENDPOINT}
    bucket-name: ${R2_BUCKET_NAME}
    public-url: ${R2_PUBLIC_URL}
    presigned-url-ttl-minutes: 10
    max-file-size-bytes: 10485760  # 10MB
  cors:
    allowed-origins:
      - http://localhost:3000
  markdown:
    allow-external-links: true
    allowed-image-protocols:
      - http
      - https
      - data
    add-rel-nofollow: true
    max-content-length: 1000000 # 1MB

common:
  mail:
    mailgun:
      domain: ${MAILGUN_DOMAIN}
      from-address: "Contentria <no-reply@${MAILGUN_DOMAIN}>"
