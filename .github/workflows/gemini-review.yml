name: Gemini AI Code Review

on:
  pull_request:
    types: [opened, synchronize, reopened]

jobs:
  review:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Get PR Diff
        id: get_diff
        run: |
          git diff ${{ github.event.pull_request.base.sha }}...${{ github.event.pull_request.head.sha }} > pr_diff.txt
          DIFF_SIZE=$(wc -c < pr_diff.txt | tr -d ' ')
          echo "diff_size=$DIFF_SIZE" >> $GITHUB_OUTPUT

          # Truncate if diff exceeds 100KB to avoid token limits
          MAX_SIZE=102400
          if [ "$DIFF_SIZE" -gt "$MAX_SIZE" ]; then
            head -c $MAX_SIZE pr_diff.txt > pr_diff_truncated.txt
            echo -e "\n\n--- DIFF TRUNCATED (original: ${DIFF_SIZE} bytes, limit: ${MAX_SIZE} bytes) ---" >> pr_diff_truncated.txt
            mv pr_diff_truncated.txt pr_diff.txt
            echo "truncated=true" >> $GITHUB_OUTPUT
          else
            echo "truncated=false" >> $GITHUB_OUTPUT
          fi

      - name: Minimize Previous Reviews
        uses: actions/github-script@v7
        with:
          script: |
            const comments = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.payload.pull_request.number,
            });

            for (const comment of comments.data) {
              if (comment.body.startsWith('## 🤖 Gemini AI Code Review')) {
                await github.rest.issues.updateComment({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  comment_id: comment.id,
                  body: '<details><summary>🤖 Gemini AI Code Review (outdated)</summary>\n\n' + comment.body + '\n\n</details>',
                });
              }
            }

      - name: Gemini AI Review
        if: steps.get_diff.outputs.diff_size > 0
        uses: actions/github-script@v7
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        with:
          script: |
            const fs = require('fs');
            const diff = fs.readFileSync('pr_diff.txt', 'utf8');
            const instructions = fs.readFileSync('GEMINI.md', 'utf8');
            const apiKey = process.env.GEMINI_API_KEY;

            if (!apiKey) {
              core.setFailed('GEMINI_API_KEY is not set in secrets.');
              return;
            }

            const prTitle = context.payload.pull_request.title;
            const prBody = context.payload.pull_request.body || '(No description provided)';
            const truncated = '${{ steps.get_diff.outputs.truncated }}' === 'true';
            const truncationNotice = truncated
              ? '\n\n⚠️ Note: The diff was truncated due to size. Focus on reviewing what is provided.'
              : '';

            const prompt = `
            You are a Senior Software Engineer and Code Reviewer.
            Review the following Pull Request based on the instructions provided in GEMINI.md.

            ### Instructions from GEMINI.md:
            ${instructions}

            ### Pull Request Title:
            ${prTitle}

            ### Pull Request Description:
            ${prBody}

            ### Pull Request Diff:
            ${diff}
            ${truncationNotice}

            ### Guidelines for your response:
            1. If there are no critical issues and the code is good to go, start your response with "LGTM".
            2. Provide a summary of the changes and your feedback.
            3. List any specific issues or suggestions for improvement.
            4. Use English for your entire response.
            `;

            try {
              const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent?key=${apiKey}`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                  contents: [{ parts: [{ text: prompt }] }]
                })
              });

              const data = await response.json();

              if (!data.candidates || data.candidates.length === 0) {
                console.error('Gemini API response error:', JSON.stringify(data));
                throw new Error('No candidates found in Gemini response.');
              }

              const reviewText = data.candidates[0].content.parts[0].text;

              // Post a comment on the PR
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.payload.pull_request.number,
                body: "## 🤖 Gemini AI Code Review\n\n" + reviewText
              });

              // If Gemini says LGTM, approve the PR
              const isLGTM = reviewText.trim().toUpperCase().startsWith('LGTM');
              if (isLGTM) {
                await github.rest.pulls.createReview({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  pull_number: context.payload.pull_request.number,
                  event: 'APPROVE',
                  body: 'Gemini AI approved this PR. LGTM!'
                });
                console.log('PR Approved by Gemini.');
              } else {
                console.log('Gemini suggested changes or did not approve.');
              }

            } catch (error) {
              core.setFailed(`Gemini API call failed: ${error.message}`);
            }
